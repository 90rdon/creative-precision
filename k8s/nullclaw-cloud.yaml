apiVersion: v1
kind: Namespace
metadata:
  name: nullclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sa
  namespace: nullclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-role
  namespace: nullclaw
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]
- apiGroups: [""]
  resourceNames: ["tailscale-auth"]
  resources: ["secrets"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-rb
  namespace: nullclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-role
subjects:
- kind: ServiceAccount
  name: tailscale-sa
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nullclaw-pvc
  namespace: nullclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: nullclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nullclaw
  template:
    metadata:
      labels:
        app: nullclaw
    spec:
      serviceAccountName: tailscale-sa
      imagePullSecrets:
      - name: gcr-pull-secret
      initContainers:
      - name: seed-data
        image: alpine:latest
        command: ["sh", "-c", "mkdir -p /nullclaw-data/devices && chmod -R 777 /nullclaw-data"]
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
      - name: copy-ts-bin
        image: tailscale/tailscale:latest
        command: ["sh", "-c", "cp /usr/local/bin/tailscale /shared/bin/tailscale"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      - name: copy-docker-bin
        image: docker:latest
        command: ["sh", "-c", "cp /usr/local/bin/docker /shared/bin/docker"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      - name: setup-mocks
        image: alpine:latest
        command: ["sh", "-c", "printf '#!/bin/sh\\nexit 0' > /shared/bin/systemctl && printf '#!/bin/sh\\nexit 0' > /shared/bin/loginctl && chmod +x /shared/bin/systemctl /shared/bin/loginctl"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      containers:
      - name: nullclaw
        image: gcr.io/my-first-rag-486720/nullclaw:latest
        imagePullPolicy: Always
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "echo 'starting nullclaw WITHOUT tailscale wait for testing'; /usr/local/bin/nullclaw gateway --port 3000 --host ::"]
        ports:
        - containerPort: 3000
        env:
        - name: NULLCLAW_HOME
          value: "/nullclaw-data"
        - name: PATH
          value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/shared/bin"
        - name: TS_SOCKET
          value: "/var/run/tailscale/tailscaled.sock"
        - name: DOCKER_HOST
          value: "tcp://localhost:2375"
        - name: NVIDIA_API_KEY
          valueFrom:
            secretKeyRef:
              name: nullclaw-secrets
              key: NVIDIA_API_KEY
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: nullclaw-secrets
              key: OPENROUTER_API_KEY
        - name: NULLCLAW_TOKEN
          valueFrom:
            secretKeyRef:
              name: nullclaw-secrets
              key: NULLCLAW_TOKEN
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
        - name: dind-socket
          mountPath: /run
        - name: shared-bin
          mountPath: /shared/bin
      
      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
        - name: dind-socket
          mountPath: /run
      volumes:
      - name: nullclaw-data
        persistentVolumeClaim:
          claimName: nullclaw-pvc
      - name: dind-socket
        emptyDir: {}
      - name: shared-bin
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nullclaw
  namespace: nullclaw
spec:
  type: ClusterIP # Internal only gateway
  selector:
    app: nullclaw
  ports:
  - port: 3000
    targetPort: 3000
