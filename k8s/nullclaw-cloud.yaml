apiVersion: v1
kind: Namespace
metadata:
  name: nullclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sa
  namespace: nullclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-role
  namespace: nullclaw
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-rb
  namespace: nullclaw
subjects:
- kind: ServiceAccount
  name: tailscale-sa
  namespace: nullclaw
roleRef:
  kind: Role
  name: tailscale-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nullclaw-pvc
  namespace: nullclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: nullclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nullclaw
  template:
    metadata:
      labels:
        app: nullclaw
    spec:
      serviceAccountName: tailscale-sa
      initContainers:
      - name: initial-seed
        image: nullclaw:latest # Or your cloud image
        command: ["sh", "-c", "if [ ! -f /nullclaw-data/config.json ]; then echo 'Seeding cloud volume from bundled local data...'; cp -a /nullclaw-data-seed/. /nullclaw-data/; fi"]
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
      - name: copy-ts-bin
        image: tailscale/tailscale:latest
        command: ["sh", "-c", "cp /usr/local/bin/tailscale /shared/bin/tailscale"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      - name: copy-docker-bin
        image: docker:latest
        command: ["sh", "-c", "cp /usr/local/bin/docker /shared/bin/docker"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      - name: setup-mocks
        image: alpine:latest
        command: ['sh', '-c', "printf '#!/bin/sh\\nexit 0' > /shared/bin/systemctl && printf '#!/bin/sh\\nexit 0' > /shared/bin/loginctl && chmod +x /shared/bin/systemctl /shared/bin/loginctl"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared/bin
      containers:
      - name: nullclaw
        image: ghcr.io/phioranex/nullclaw-docker:latest # Replace with your cloud registry path
        imagePullPolicy: Always
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "echo 'waiting for tailscale socket...'; while [ ! -S /var/run/tailscale/tailscaled.sock ]; do sleep 1; done; echo 'sockets found, starting nullclaw'; /usr/local/bin/nullclaw gateway --port 3000 --host ::"]
        ports:
        - containerPort: 3000
        env:
        - name: NULLCLAW_HOME
          value: "/nullclaw-data"
        - name: PATH
          value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/shared/bin"
        - name: TS_SOCKET
          value: "/var/run/tailscale/tailscaled.sock"
        - name: DOCKER_HOST
          value: "tcp://localhost:2375"
        # Secrets should be injected via env from a Kubernetes Secret in the cloud
        - name: NVIDIA_API_KEY
          valueFrom:
            secretKeyRef:
              name: nullclaw-secrets
              key: NVIDIA_API_KEY
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: nullclaw-secrets
              key: OPENROUTER_API_KEY
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
        - name: ts-socket
          mountPath: /var/run/tailscale
        - name: dind-socket
          mountPath: /run
        - name: shared-bin
          mountPath: /shared/bin
      
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_HOSTNAME
          value: "nullclaw-cloud"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_STATE_DIR
          value: /nullclaw-data/tailscale
        volumeMounts:
        - name: nullclaw-data
          mountPath: /nullclaw-data
        - name: ts-socket
          mountPath: /var/run/tailscale

      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        volumeMounts:
        - name: dind-socket
          mountPath: /run
        - name: nullclaw-data
          mountPath: /nullclaw-data
      
      volumes:
      - name: nullclaw-data
        persistentVolumeClaim:
          claimName: nullclaw-pvc
      - name: ts-socket
        emptyDir: {}
      - name: dind-socket
        emptyDir: {}
      - name: shared-bin
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nullclaw
  namespace: nullclaw
spec:
  type: LoadBalancer # Cloud provider will assign a real external IP
  selector:
    app: nullclaw
  ports:
  - port: 3000
    targetPort: 3000
