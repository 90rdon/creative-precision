services:
  aieos-mcp:
    build: .
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/db.json
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./data:/app/data
      - ~/.kube/config:/root/.kube/config:ro
    # MCP servers usually run via stdio. To use it with Claude or Gemini,
    # it's usually piped but as a standalone service, we can allow it to live
    stdin_open: true
    tty: true
    restart: always

# How to use:
# 1. mkdir -p data
# 2. cp db.json data/
# 3. docker compose up -d
