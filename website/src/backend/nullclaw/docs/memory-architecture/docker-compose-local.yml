version: '3.8'

# Minimal Local Services for Zero-Cost Experiment
# ===============================================
# All data stored locally on your Mac

services:
  # PostgreSQL with pgvector for medium-term memory
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nullclaw-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./schema/pg_schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_USER: nullclaw
      POSTGRES_PASSWORD: nullclaw
      POSTGRES_DB: nullclaw
      POSTGRES_INITDB_ARGS: "-E UTF8"
    networks:
      - nullclaw-network
    command: postgres -c 'max_connections=200' -c 'shared_buffers=256MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nullclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant for long-term vector storage
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nullclaw-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - nullclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for cache and real-time sync
  redis:
    image: redis:7-alpine
    container_name: nullclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nullclaw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nullclaw-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: nullclaw@local
      PGADMIN_DEFAULT_PASSWORD: nullclaw
    networks:
      - nullclaw-network

networks:
  nullclaw-network:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
