services:
  # PostgreSQL - Medium-term memory
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nullclaw-postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: nullclaw
      POSTGRES_PASSWORD: nullclaw
      POSTGRES_DB: nullclaw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nullclaw"]
      interval: 5s
      timeout: 5s
      retries: 3
    # Resource limits for efficiency
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Qdrant - Long-term vector storage
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nullclaw-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Redis - Cache and sync
  redis:
    image: redis:7-alpine
    container_name: nullclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
