version: '3.8'

services:
  # ==================== Storage Layer ====================

  # PostgreSQL with pgvector for medium-term memory
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nullclaw-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema/pg_schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_USER: nullclaw
      POSTGRES_PASSWORD: nullclaw
      POSTGRES_DB: nullclaw
    networks:
      - nullclaw-network
    command: postgres -c 'max_connections=200'

  # Qdrant for long-term vector storage
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nullclaw-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - nullclaw-network

  # Redis for cache and real-time sync
  redis:
    image: redis:7-alpine
    container_name: nullclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - nullclaw-network

  # ==================== Processing Layer ====================

  # Memory Consolidation Service
  consolidation:
    build:
      context: ./services/consolidation
      dockerfile: Dockerfile
    container_name: nullclaw-consolidation
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
      - redis
    volumes:
      - ./services/consolidation/src:/app/src
      - ./logs:/app/logs
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: nullclaw
      POSTGRES_PASSWORD: nullclaw
      POSTGRES_DB: nullclaw
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: info
    networks:
      - nullclaw-network

  # Sync Service (WebSocket + Pub/Sub)
  sync:
    build:
      context: ./services/sync
      dockerfile: Dockerfile
    container_name: nullclaw-sync
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    volumes:
      - ./services/sync/src:/app/src
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WS_PORT: 8080
      LOG_LEVEL: info
    networks:
      - nullclaw-network

  # ==================== Monitoring ====================

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: nullclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - nullclaw-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nullclaw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_PASSWORD: nullclaw
    networks:
      - nullclaw-network

  # ==================== Admin UI ====================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nullclaw-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nullclaw.local
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - nullclaw-network

networks:
  nullclaw-network:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  prometheus-data:
  grafana-data:
